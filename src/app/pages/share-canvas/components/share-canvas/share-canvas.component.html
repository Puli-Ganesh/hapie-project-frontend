<div class="app-container">

    <ng-container *ngIf="!isLinkExpired">
        <div class="inner-header-wrap">
            <div class="left-action-wrap">
                <h2 class="main-title">{{projectName}}</h2>
            </div>

            <div class="right-action-wrap">
                <ng-container *ngIf="templateList.length > 0">
                    <app-drop-down [optionsList]="templateList" displayKey="title" (onSelectChange)="onSelectTemplate($event)"></app-drop-down>
                </ng-container>

                <ng-container ngSwitch="{{hasEditAccess ? 'Y' : 'N'}}">
                    <button *ngSwitchCase="'N'" class="app-button primary" type="button"
                        (click)="openRequestEditAccessModal()">
                        <span class="btn-label">request edit access</span>
                    </button>
                    <button *ngSwitchCase="'Y'" class="app-button primary success-bg" type="button">
                        <span class="btn-label">edit allowed</span>
                    </button>
                </ng-container>
            </div>
        </div>


        <div class="canvas-wrap-ctr">
            <div class="canvas-wrap">

                <div class="category-list-container"
                    *ngFor="let categories of categoryList; let categoriesIndex = index;">
                    <div class="category-list-wrap">
                        <h2 class="title">{{categories?.title}}</h2>

                        <div class="requirement-list-wrap" [ngClass]="{
                            'multi-list': categories.hasMany,
                            'show-list': category.toggler
                        }" *ngFor="let category of categories.list; let catIndex = index;">
                            <ng-container *ngIf="categories.hasMany">
                                <div class="sub-title-wrap" (click)="category.toggler = !category.toggler;">
                                    <h2 class="sub-title">{{category.dTitle}}</h2>
                                    <div class="toggle-icon-wrap" [class.open]="category.toggler">
                                        <svg class="icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
                                            <circle cx="8" cy="8" r="7.25" stroke="#E4E7EC" stroke-width="1.5"/>
                                            <path d="M5 7L8 10L11 7" stroke="#344051" stroke-width="1.5" stroke-linecap="round"/>
                                        </svg>
                                    </div>
                                </div>
                            </ng-container>

                            <div class="requirement-list" *ngIf="category.requirements?.length > 0">
                                <ng-container *ngFor="let requirement of category.requirements; let reqIndex = index;">
                                    <div class="requirement-container" [ngClass]="{
                                        'upsert-mode': requirement?.upsertMode,
                                        'high': requirement?.matchingCount >= 0 && requirement.matchingCount >= 75,
                                        'medium': requirement?.matchingCount >= 0 && requirement.matchingCount >= 50 && requirement.matchingCount < 75,
                                        'low': requirement?.matchingCount >= 0 && requirement.matchingCount < 50
                                    }">
                                        <ng-container [ngSwitch]="requirement.toggler ? 'open' : 'close'">
                                            <span *ngSwitchCase="'open'" class="requirement-txt">{{
                                                requirement.requirement }}</span>
                                            <div *ngSwitchCase="'close'" class="requirement-wrap">
                                                <span class="requirement-txt">{{ requirement.requirement }}</span>
                                                <div class="toggle-icon-wrap" (click)="requirement.toggler = !requirement.toggler;">
                                                    <svg class="inner-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
                                                        <circle cx="8" cy="8" r="7.25" stroke="#E4E7EC" stroke-width="1.5"></circle>
                                                        <path d="M5 7L8 10L11 7" stroke="#344051" stroke-width="1.5" stroke-linecap="round"></path>
                                                    </svg>
                                                </div>
                                            </div>
                                        </ng-container>

                                        <div class="action-wrap">
                                            <ng-container *ngIf="hasEditAccess">
                                                <div class="btn"
                                                    (click)="onEditRequirement(categoriesIndex, catIndex, reqIndex)">
                                                    Edit
                                                </div>
                                                <div class="btn"
                                                    (click)="onDeleteRequirement(categoriesIndex, catIndex, reqIndex)">
                                                    Delete</div>
                                            </ng-container>
                                            <div class="icon-wrap" (click)="requirement.toggler = !requirement.toggler;">
                                                <svg class="icon" width="16" height="16" viewBox="0 0 16 16" fill="none" class="icon">
                                                    <circle cx="8" cy="8" r="7.25" stroke="#E4E7EC" stroke-width="1.5"></circle>
                                                    <path d="M5 7L8 10L11 7" stroke="#344051" stroke-width="1.5" stroke-linecap="round"></path>
                                                </svg>
                                            </div>
                                        </div>

                                        <ng-container
                                            *ngIf="hasEditAccess && ((editIndexes.categoriesIndex === categoriesIndex && editIndexes.categoryIndex === catIndex && editIndexes.requirementIndex === reqIndex) || !requirement?._id)">
                                            <textarea class="textarea" name="requirement"
                                                [(ngModel)]="requirement.requirement"
                                                (keydown.shift.enter)="$event.preventDefault();"
                                                (keydown.enter)="$event.preventDefault();" appAutofocus
                                                placeholder="Type here..."></textarea>
                                            <div class="upsert-action-wrap">
                                                <button class="app-button cancel"
                                                    (click)="resetEditingAndCancelUpserData()">cancel</button>
                                                <button class="app-button primary" (click)="onSaveChanges()">save
                                                    changes</button>
                                            </div>
                                        </ng-container>
                                    </div>
                                </ng-container>
                            </div>

                            <button *ngIf="hasEditAccess" class="app-button wide add-btn" type="button" tabindex="-1"
                                (click)="addNewRequirement(categoriesIndex, catIndex)">
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" class="btn-icon">
                                    <g clip-path="url(#clip0_334_541)">
                                        <path d="M8 5.55147V10.4357" stroke="#0A0908" stroke-linecap="round"
                                            stroke-linejoin="round" />
                                        <path d="M10.4445 7.99362H5.55566" stroke="#0A0908" stroke-linecap="round"
                                            stroke-linejoin="round" />
                                        <path fill-rule="evenodd" clip-rule="evenodd"
                                            d="M11.124 1.33331H4.87635C2.69858 1.33331 1.3335 2.87469 1.3335 5.05674V10.9432C1.3335 13.1253 2.69222 14.6666 4.87635 14.6666H11.124C13.3081 14.6666 14.6668 13.1253 14.6668 10.9432V5.05674C14.6668 2.87469 13.3081 1.33331 11.124 1.33331Z"
                                            stroke="#0A0908" stroke-linecap="round" stroke-linejoin="round" />
                                    </g>
                                    <defs>
                                        <clipPath id="clip0_334_541">
                                            <rect width="16" height="16" fill="white" />
                                        </clipPath>
                                    </defs>
                                </svg>
                                <span class="btn-label">add new</span>
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </ng-container>


    <ng-container *ngIf="isLinkExpired">
        <div class="msg-wrap">
            <span class="title">Your link has been expired.</span><br><br>
        </div>
    </ng-container>

</div>

<app-toaster></app-toaster>

<app-modal id="requestEditAccessModal" [isFullScreen]="true" (onClose)="onCloseRequestEditAccessModal($event)">
    <div class="request-edit-access-wrap">

        <div class="title">request edit access</div>
        <form [formGroup]="requestEditAccessFrom" class="request-edit-access-form">
            <div class="input-container">
                <div class="input-wrap">
                    <label class="label required" for="userName">name</label>
                    <input class="input" type="text" id="userName" formControlName="userName"
                        placeholder="Enter your Full Name">
                </div>

                <div class="err-wrap" *ngIf="(userName?.touched && userName?.errors)">
                    <p *ngIf="userName?.errors?.['required']" class="err-msg">name is required!</p>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrap">
                    <label class="label" for="message">message</label>
                    <textarea class="input multiline" rows="4" id="message" formControlName="message"
                        placeholder="Please provide an explanation as to why you are requesting Edit access."></textarea>
                </div>

                <div class="err-wrap" *ngIf="(message?.touched && message?.errors)">
                    <p *ngIf="message?.errors?.['required']" class="err-msg">project name is required!</p>
                </div>
            </div>

            <button class="app-button primary wide" type="button" [class.disabled]="requestEditAccessFrom.invalid"
                [disabled]="requestEditAccessFrom.invalid" (click)="onSendRequestEditAccess()">
                <span class="btn-label">send request</span>
            </button>
        </form>

    </div>
</app-modal>
