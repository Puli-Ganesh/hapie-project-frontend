<div class="team-container">

    <div class="team-header">
        <div class="breadcrumbs-wrapper"></div>
        <app-header></app-header>
    </div>

    <div class="team-wrapper">
        <div class="title">Team Settings</div>

        <div class="search-wrapper">
            <button class="app-button primary" (click)="onAddMember()">
                <svg class="btn-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M8 12.6665L8 3.33317" stroke="white" stroke-width="1.5" stroke-linecap="round" />
                    <path d="M3.3335 8.31104H12.6668" stroke="white" stroke-width="1.5" stroke-linecap="round" />
                </svg>
                <div class="btn-label">add member</div>
            </button>

            <div class="view-wrapper">
                <div class="view-button active">
                    <svg class="icon" width="18" height="14" viewBox="0 0 18 14" fill="none">
                        <path d="M5.26667 1H17M5.26667 6.995H17M5.26667 12.99H17M1 1V1.00999M1 6.995V7.005M1 12.99V13"
                            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
                <div class="view-button">
                    <svg class="icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
                        <rect x="1" y="1" width="6.66667" height="6.66667" rx="1" stroke="currentColor"
                            stroke-width="1.2" />
                        <rect x="10.3334" y="1" width="6.66667" height="6.66667" rx="1" stroke="currentColor"
                            stroke-width="1.2" />
                        <rect x="10.3334" y="10.3333" width="6.66667" height="6.66667" rx="1" stroke="currentColor"
                            stroke-width="1.2" />
                        <rect x="1" y="10.3333" width="6.66667" height="6.66667" rx="1" stroke="currentColor"
                            stroke-width="1.2" />
                    </svg>
                </div>
            </div>

            <div class="filter-wrapper">
                <div class="filter-icon">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path

                    </svg>
                </div>
                <div class="filter-label">
                    Filters
                </div>
            </div>

            <div class="search-container">
                <input type="text" [(ngModel)]="searchQuery" (ngModelChange)="onSearchQuery($event)"
                    placeholder="Search" class="search-input">
                <div class="search-icon">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path fill-rule="evenodd" clip-rule="evenodd"
                            d="M7.15455 2.12476C6.34673 2.12482 5.55064 2.31573 4.83269 2.68154C4.11475 3.04736 3.49577 3.57747 3.0274 4.22766C2.55903 4.87785 2.25485 5.62925 2.14024 6.41919C2.02562 7.20913 2.1039 8.01468 2.36855 8.76866C2.63319 9.52263 3.07651 10.2031 3.66154 10.7534C4.24657 11.3037 4.95633 11.7079 5.73161 11.9321C6.50689 12.1563 7.32521 12.1941 8.1183 12.0424C8.91138 11.8906 9.65623 11.5537 10.2907 11.0598L12.4673 13.2099C12.5797 13.3172 12.7302 13.3765 12.8865 13.3752C13.0428 13.3738 13.1923 13.3119 13.3028 13.2027C13.4133 13.0936 13.476 12.9459 13.4773 12.7915C13.4787 12.6372 13.4186 12.4884 13.31 12.3774L11.1334 10.2273C11.7223 9.48932 12.0889 8.60252 12.1914 7.66835C12.2939 6.73418 12.128 5.79038 11.7129 4.94497C11.2977 4.09955 10.65 3.38668 9.84388 2.88792C9.03774 2.38917 8.10575 2.12469 7.15455 2.12476ZM3.28056 7.12921C3.28056 6.11424 3.68871 5.14085 4.41522 4.42316C5.14174 3.70547 6.12711 3.30227 7.15455 3.30227C8.182 3.30227 9.16737 3.70547 9.89388 4.42316C10.6204 5.14085 11.0286 6.11424 11.0286 7.12921C11.0286 8.14417 10.6204 9.11757 9.89388 9.83526C9.16737 10.5529 8.182 10.9561 7.15455 10.9561C6.12711 10.9561 5.14174 10.5529 4.41522 9.83526C3.68871 9.11757 3.28056 8.14417 3.28056 7.12921Z"
                            fill="#344051" />
                    </svg>
                </div>
            </div>
        </div>

                    <div class="tbl-td d-flex profile text-cap">
                        <div class="profile-wrap">
                            <svg *ngIf="!user.profilePicture" width="32" height="32" viewBox="0 0 60 60" fill="none">
                                <ellipse cx="30.6955" cy="21.68" rx="8.34783" ry="7.68" fill="#A6B4CA" />
                                <path fill-rule="evenodd" clip-rule="evenodd"
                                    d="M45.9851 46C45.995 45.7877 46 45.5742 46 45.3596C46 37.23 38.8366 30.6396 30 30.6396C21.1634 30.6396 14 37.23 14 45.3596C14 45.5742 14.005 45.7877 14.0149 46H45.9851Z"

                            </svg>
                            <img *ngIf="user.profilePicture" src="{{user.profilePicture}}" width="32" height="32" />
                        </div>
                        <div class="name">
                            {{(user.firstName + (user?.lastName ? (' ' + user?.lastName) : '')) || '---'}}
                        </div>
                    </div>
                    <div class="tbl-td d-flex">{{ user.email }}</div>
                    <div class="tbl-td d-flex">{{ user.role }}</div>
                    <div class="tbl-td d-flex">{{ user.projects }}</div>
                    <div class="tbl-td d-flex text-cap" [class.active]="!user.isInvited">

                    </div>

    <app-modal id="manageTeamModal" type="static" (onClose)="onModalClose($event)">
        <ng-container *ngIf="modalToggler">
            <app-add-member [memberDetails]="selectedMember" (close)="onModalClose($event)"
                (memberUpdated)="onMemberUpdated($event)" (memberAdded)="onMemberAdded($event)"></app-add-member>
        </ng-container>
    </app-modal>
</div>
