<div class="app-container">

    <div class="main-header">
        <div class="main-nav-wrap">
            <app-project-go-back-btn></app-project-go-back-btn>

            <h2 class="header-title">{{ projectDetails?.projectName }}</h2>
        </div>
        <div class="main-action-wrap">
            <app-project-exit-btn></app-project-exit-btn>
            <app-header></app-header>
        </div>
    </div>

    <div class="app-content">

        <div class="inner-header-wrap">
            <div class="left-action-wrap align-self-start">
                <h2 class="main-title">Media</h2>
            </div>

            <div class="right-action-wrap">
                <button class="app-button primary"
                    *ngIf="hasVideoUploadAccess && permissions.PROJECT_UPLOAD.includes(currentUser.type)"
                    (click)="onUploadMedia()">
                    <svg class="btn-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path
                            d="M2.66699 11.3332V12.6665C2.66699 13.0201 2.80747 13.3593 3.05752 13.6093C3.30756 13.8594 3.6467 13.9998 4.00033 13.9998H12.0003C12.3539 13.9998 12.6931 13.8594 12.9431 13.6093C13.1932 13.3593 13.3337 13.0201 13.3337 12.6665V11.3332M4.66699 5.99984L8.00033 2.6665M8.00033 2.6665L11.3337 5.99984M8.00033 2.6665V10.6665"
                            stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <span class="btn-label">Upload</span>
                </button>
            </div>
        </div>

        <div class="media-wrap" *ngIf="recordings.length; else noMediaView;">
            <div class="media-item border-{{projectColor}}" *ngFor="let recording of recordings;"
                (click)="navigateOnMediaTranscript(recording)">
                <div class="media-img bg-{{projectColor}}-2">
                    <img *ngIf="recording?.thumbnailUrl" src="{{recording?.thumbnailUrl}}" alt="project">
                </div>
                <div class="media-details">
                    <h2 class="media-name">media upload {{recording?.version}}</h2>
                    <div class="media-desc">uploaded by :- {{ recording?.userId ? (recording.userId?.firstName + " " +
                        recording.userId?.lastName) : "Zoom Meeting" }}</div>
                </div>
            </div>
        </div>

        <ng-template #noMediaView>
            <div class="no-media">
                <div class="icon">
                    <svg class="fg-{{projectColor}}-2" width="104" height="104" viewBox="0 0 104 104" fill="none">
                        <path opacity="0.4"
                            d="M70.7748 95.3338H33.2195C18.5326 95.3338 8.66602 85.033 8.66602 69.6991V34.3064C8.66602 18.9724 18.5326 8.66724 33.2195 8.66724H70.7791C85.4661 8.66724 95.3327 18.9724 95.3327 34.3064V69.6991C95.3327 85.033 85.4661 95.3338 70.7748 95.3338Z"
                            fill="currentColor" />
                        <path fill-rule="evenodd" clip-rule="evenodd"
                            d="M48.7276 37.5922C48.7276 43.5288 43.8959 48.3605 37.9591 48.3605C32.0181 48.3605 27.1908 43.5288 27.1908 37.5922C27.1908 31.6556 32.0181 26.8196 37.9591 26.8196C43.8959 26.8196 48.7276 31.6556 48.7276 37.5922ZM84.0676 61.0468C85.0773 62.0261 85.801 63.1441 86.2776 64.3358C87.7206 67.9411 86.971 72.2744 85.4283 75.8451C83.5996 80.0961 80.0983 83.3071 75.687 84.7111C73.7283 85.3394 71.6743 85.6081 69.6246 85.6081H33.3068C29.6928 85.6081 26.4948 84.7674 23.8732 83.1901C22.2308 82.2021 21.9405 79.9271 23.1582 78.4451C25.1948 75.9751 27.2055 73.4964 29.2335 70.9961C33.0988 66.2121 35.7032 64.8254 38.5978 66.0431C39.7722 66.5458 40.9508 67.3041 42.1642 68.1014C45.397 70.2421 49.8906 73.1801 55.81 69.9908C59.856 67.7786 62.2047 63.9926 64.2491 60.6971L64.2903 60.6308C64.4277 60.4102 64.5642 60.1901 64.7002 59.9699C65.3953 58.8467 66.08 57.7404 66.8556 56.7221C67.8176 55.4611 71.3883 51.5178 76.0033 54.3258C78.9456 56.0938 81.42 58.4858 84.0676 61.0468Z"
                            fill="currentColor" />
                    </svg>
                </div>
                <div class="title">No Media yet</div>
                <div class="subtitle">Click Upload to upload media files</div>
            </div>
        </ng-template>

    </div>


    <ng-container *ngIf="isUploadingMedia">
        <app-upload-media-modal (onClose)="onCloseUploadMediaModal($event)"></app-upload-media-modal>
    </ng-container>
</div>
