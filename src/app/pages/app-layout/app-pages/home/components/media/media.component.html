    <div class="media-container">
        <div class="title-wrapper">
            <h2 class="title">Media</h2>
            <button class="app-button primary"
                *ngIf="isUploadVisible && permissions.PROJECT_UPLOAD.includes(currentUser.type)"
                (click)="onUploadMedia()">
                <svg class="btn-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path
                        d="M2.66699 11.3332V12.6665C2.66699 13.0201 2.80747 13.3593 3.05752 13.6093C3.30756 13.8594 3.6467 13.9998 4.00033 13.9998H12.0003C12.3539 13.9998 12.6931 13.8594 12.9431 13.6093C13.1932 13.3593 13.3337 13.0201 13.3337 12.6665V11.3332M4.66699 5.99984L8.00033 2.6665M8.00033 2.6665L11.3337 5.99984M8.00033 2.6665V10.6665"
                        stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <span class="btn-label">Upload</span>
            </button>
        </div>

        <div class="media-wrap" *ngIf="recordings.length; else noMediaView;">
            <div class="media-item border-{{projectColor}}" *ngFor="let recording of recordings;"
                (click)="navigateOnMediaTranscript(recording)">
                <div class="media-img bg-{{projectColor}}-2">
                    <img src="{{recording?.thumbnailUrl}}" alt="project">
                </div>
                <div class="media-details">
                    <h2 class="media-name">media upload {{recording?.version}}</h2>
                    <div class="media-desc">uploaded by :- {{ recording?.userId ? (recording.userId?.firstName + " " +
                        recording.userId?.lastName) : "Zoom Meeting" }}</div>
                </div>
            </div>
        </div>

        <ng-template #noMediaView>
            <div class="no-media">
                <div class="icon">
                    <svg class="fg-{{projectColor}}-2" width="104" height="104" viewBox="0 0 104 104" fill="none">
