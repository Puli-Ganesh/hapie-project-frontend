<div class="template-wrapper">

    <div class="template-header">
        <div class="breadcrumbs-wrapper">
            <app-project-go-back-btn [skipNavigation]="!!selectedTemplate?._id" (onClick)="onGoBack($event)"></app-project-go-back-btn>

            <h2 class="breadcrumb-item">
                {{ projectDetails?.projectName }}
            </h2>
        </div>
        <div class="actions-wrapper">
            <app-project-exit-btn (onClick)="onExit($event)"></app-project-exit-btn>
        </div>
        <app-header></app-header>
    </div>

    <div class="body">
        <ng-container *ngIf="!selectedTemplate; else templateView">
            <div class="inner-header">
                <h1 class="title">Template</h1>
                <div class="right-side">
                    <button class="app-button primary" *ngIf="permissions.TEMPLATE_UPLOAD.includes(currentUser.type)"
                        type="button" (click)="onUploadClick()">
                        <svg class="btn-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
                            <path
                                d="M1.66602 10.3332V11.6665C1.66602 12.0201 1.80649 12.3593 2.05654 12.6093C2.30659 12.8594 2.64573 12.9998 2.99935 12.9998H10.9993C11.353 12.9998 11.6921 12.8594 11.9422 12.6093C12.1922 12.3593 12.3327 12.0201 12.3327 11.6665V10.3332M3.66602 4.99984L6.99935 1.6665M6.99935 1.6665L10.3327 4.99984M6.99935 1.6665V9.6665"
                                stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <span class="btn-label">upload</span>
                    </button>
                </div>
            </div>

            <div class="pills-wrapper">
                <div class="pill-wrapper" [class.selected]="selectedNodeId === node.id"
                    *ngFor="let node of templateNodes; let projectIndex = index;" (click)="selectPill(node.id)">
                    {{ node?.config?.documentTitle }}
                </div>
            </div>

            <div class="app-table-ctrl">
                <div class="app-table-wrap">
                    <div class="tbl-tr" *ngFor="let template of filteredTemplateList;let tIndex = index"
                        [class.selected]="defaultTemplateId == template?._id">

                            <svg *ngIf="template?._id == defaultTemplateId" width="18" height="18" viewBox="0 0 18 18"
                                fill="none">

                                <rect x="4" y="4" width="10" height="10" rx="5" fill="#2C76FF" />
                            </svg>
                            <svg *ngIf="template?._id != defaultTemplateId" width="18" height="18" viewBox="0 0 18 18"
                                fill="none">
                                <rect x="0.5" y="0.5" width="17" height="17" rx="8.5" fill="#F9FAFB" stroke="#E4E7EC" />
                            </svg>
                        </div>

                        </div>
                    </div>
                </div>
            </div>

        </ng-container>

        <ng-template #templateView>
            <div class="editor-wrapper">

                <div class="inner-header">
                    <h1 class="title">{{ selectedTemplate.title }}</h1>

                    <div class="right-side">
                        <button class="app-button primary" type="button" (click)="onGoBack('skip')">
                            <span class="btn-label">Go Back</span>
                        </button>
                        <ng-container *ngIf="selectedTemplate && permissions.TEMPLATE_EDIT.includes(currentUser.type)">
                            <button class="app-button primary" type="button" (click)="onSaveTemplate()">
                                <span class="btn-label">save changes</span>
                            </button>
                        </ng-container>
                    </div>
                </div>

                <div class="ck-editor-wrapper">
                    <div class="document-editor">
                        <div class="document-editor__toolbar"></div>
                        <div class="document-editor__editable-container">
                            <div id="outline" style="display: none;"></div>
                            <div class="document-editor__editable">
                            </div>
                        </div>
                    </div>
                    <div id="sidebar"></div>
                </div>
            </div>
        </ng-template>
    </div>


    <ng-container *ngIf="isUploading">
        <app-upload-document-modal [projectId]="projectDetails?._id" [nodeId]="selectedNodeId" (onClose)="onCloseModal()"
            (documentUpdated)="onDocumentUpdated($event)"></app-upload-document-modal>
    </ng-container>

    <ng-container *ngIf="deleteTemplateId">
        <app-modal id="deleteTemplateModal" (onClose)="onDeleteCancel()">
            <div class="delete-template-modal">
                <div class="title">
                    Delete template
                </div>
                <div class="subtitle">
                    Are you sure you want to delete this template?
                </div>
                <div class="actions-container">
                    <button class="app-button primary" (click)="onDeleteConfirm()">
                        <span class="btn-label">Yes, Delete</span>
                    </button>
                    <button class="app-button" (click)="onDeleteCancel()">
                        <span class="btn-label">Not Now</span>
                    </button>
                </div>
            </div>
        </app-modal>
    </ng-container>
</div>
