    <div class="main-wrapper" id="mainCanvasWrapper">
        <canvas id="mainCanvas"></canvas>

        <div class="details-drawer" *ngIf="drawerToggler" #detailsDrawer>
            <!-- <div class="dropdown-wrapper">
                <div class="label">Document's Title</div>
                <div class="selected-wrapper" (click)="templateToggler = !templateToggler">
                    <div class="selected-option">
                        {{ selectedTemplate?.title ?? 'Please select'}}
                    </div>
                    <svg class="icon" [class.open]="templateToggler" width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <circle cx="8" cy="8" r="7.25" stroke="#E4E7EC" stroke-width="1.5" />
                        <path d="M5 7L8 10L11 7" stroke="#344051" stroke-width="1.5" stroke-linecap="round" />
                    </svg>
                    <div class="list-wrapper" *ngIf="templateToggler">
                        <div class="list-option" *ngFor="let template of templatesList; let tIndex = index;" (click)="onSelectTemplate($event, tIndex);">
                            {{ template.title }}
                        </div>
                    </div>
                </div>
            </div> -->
            <ng-container [ngSwitch]="openDrawerFor">
                <div *ngSwitchCase="'Document'" class="input-wrapper">
                    <div class="label">Document's Title</div>
                    <input type="text" [(ngModel)]="documentTitle" class="input">
                </div>

                <div *ngSwitchCase="'Confluence'" [formGroup]="confluenceConfigForm" class="input-wrapper">
                    <div class="label required">URL</div>
                    <input type="text" formControlName="confluenceUrl" class="input">
                    <div class="label required">Username</div>
                    <input type="text" formControlName="confluenceUsername" class="input">
                    <div class="label required">Password</div>
                    <input type="text" formControlName="confluencePassword" class="input">
                    <div class="label required">Space Key</div>
                    <input type="text" formControlName="confluenceSpaceKey" class="input">
                </div>
                
                <div *ngSwitchCase="'Confluence Agent'" class="input-wrapper">
                    <div class="label required">Agent</div>
                    <div class="options-wrap">
                        <app-drop-down [optionsList]="_agentList" [selectedOption]="confluenceAgentConfig.agent"
                         (onSelectChange)="onSelectConfluenceAgentConfig($event, 'agent')" minWidth="100%"></app-drop-down>
                    </div>
                    <div class="label required">AI Model</div>
                    <div class="options-wrap">
                        <app-drop-down [optionsList]="_aiModelList" [selectedOption]="confluenceAgentConfig.aiModel"
                         (onSelectChange)="onSelectConfluenceAgentConfig($event, 'aiModel')" minWidth="100%"></app-drop-down>
                    </div>
                </div>
            </ng-container>

            <div class="actions-wrapper">
                <button class="app-button primary" *ngIf="permissions.WORKFLOW_EDIT.includes(loggedInUser.type)" (click)="onDetailsSave()">
                    <div class="btn-label">Save</div>
                </button>
                <button class="app-button" (click)="onDetailsCancel()">
                    <div class="btn-label">Cancel</div>
                </button>
            </div>
        </div>
    </div>
</div>
