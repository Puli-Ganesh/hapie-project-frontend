<app-modal id="uploadDocModal" (onClose)="onCloseModal($event)">
    <div class="upload-wrapper">
        <div class="title">Document Upload</div>

        <div class="scrollable-content">
            <div class="media-upload-list" *ngIf="documentUploadForm.controls.length > 0">
                <div class="media-upload-wrap"
                    *ngFor="let mediaUpload of documentUploadForm.controls; let fileIndex = index;">
                    <div class="media-upload">
                        <span class="media-title">
                            {{mediaUpload.value?.mediaFile?.name || mediaUpload.value?.mediaUrl?.split('/')?.pop()}}
                        </span>
                        <div class="progress-bar-wrap">
                            <div class="bar" [class.success]="mediaUpload.value?.progress == 100"
                                [style.width.%]="mediaUpload.value.progress"></div>
                        </div>
                    </div>

                    <!-- <app-drop-down [selectedOption]="mediaUpload.value.language" [optionsList]="languageList"
                        uniqueKey="code" displayKey="name"
                        (onSelectChange)="onFileLanguageSelect($event, fileIndex)"></app-drop-down> -->

                    <div class="delete-icon-wrap" *ngIf="mediaUpload.value.progress === 0">
                        <svg class="delete-icon" (click)="onRemoveMedia($event, fileIndex)" width="24"
                            height="24" viewBox="0 0 24 24" fill="none">

                                fill="#344051" />
                        </svg>
                    </div>
                </div>
            </div>

            <label for="file-select" class="upload-file-label">Upload file</label>
            <div class="uploader-wrapper" appDragDropFile (fileDropped)="onFileDrop($event)">
                <div class="message-wrapper">
                    <label class="label" for="file-select">
                        Click here to select a file(s)
                        <input class="file-select" id="file-select" type="file" accept="{{imageMimeTypes.join(', ')}}"
                            (change)="onFileChoose($event)">
                    </label>
                    <div>
                        or Drag and drop here
                    </div>
                    <div class="mime-types">
                        DOCX, TXT, JSON
                    </div>
                </div>
            </div>
            <p class="file-err" *ngIf="mimeTypeNotSupportErr">{{mimeTypeNotSupportErr}}</p>

            <div class="or">or</div>

            <form class="url-form" [formGroup]="videoForm">
                <label for="url">Paste Link</label>
                <input type="text" formControlName="url" name="url" placeholder="Google Document link" />
            </form>
        </div>

            (click)="onUploadMedia()">

            </span>
            <span class="btn-label">Upload Document</span>
        </button>
    </div>
</app-modal>
